name: tests
on:
  push:
    branches:
      - develop
  pull_request:
  workflow_dispatch:
jobs:
  unit:
    concurrency:
      group: unit-${{ github.ref }}-${{ matrix.os }}-${{ matrix.go-version }}
      cancel-in-progress: true
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [windows]
        include:
          - os: windows
            cgo: 0
            race: ""
          - os: ubuntu
            cgo: 1
            race: "-race"
          - os: macOS
            cgo: 1
            race: "-race"
    env:
      OS: ${{ matrix.os }}-latest
      GO: ${{ matrix.go-version }}
      CGO_ENABLED: ${{ matrix.cgo }}
    runs-on: ${{ matrix.os }}-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Test
        run: go test -coverpkg=./internal/... -vet=off -count=1 -coverprofile unit.txt -covermode atomic ./...

