name: tests
on:
  push:
    branches:
      - develop
  pull_request:
  workflow_dispatch:
jobs:
  unit:
    concurrency:
      group: unit-${{ github.ref }}-${{ matrix.os }}-${{ matrix.go-version }}
      cancel-in-progress: true
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [windows]
    env:
      CGO_ENABLED: 0
    runs-on: ${{ matrix.os }}-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Test
        run: go test -timeout 120s -p 1 -v -coverpkg=./internal/... -vet=off -count=1 -coverprofile unit.txt -covermode atomic ./...

